<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLAUDEOS — Homelab Mission Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2305080b'/><text y='72' x='50' text-anchor='middle' font-size='60' fill='%23ffb347' font-family='monospace'>◈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700&family=Spline+Sans+Mono:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>

<aside class="rail">
  <div class="wordmark">
    <div class="wordmark-glyph">◈</div>
    <div>
      <div class="wordmark-name">CLAUDE<span>OS</span></div>
      <div class="wordmark-sub">HOMELAB MISSION CONTROL</div>
    </div>
  </div>

  <nav class="nav" id="nav">
    <a href="#/dashboard" data-route="dashboard">
      <span class="nav-idx">01</span><span class="nav-label">DASHBOARD</span>
    </a>
    <a href="#/ops" data-route="ops">
      <span class="nav-idx">02</span><span class="nav-label">OPERATIONS</span>
    </a>
    <a href="#/setup" data-route="setup">
      <span class="nav-idx">03</span><span class="nav-label">SETUP</span>
    </a>
  </nav>

  <div class="rail-systems" id="rail-systems"></div>

  <div class="rail-foot">
    <div class="rail-clock" id="clock">--:--:--</div>
    <div class="rail-poll" id="poll-indicator"><span class="dot"></span> LINK IDLE</div>
  </div>
</aside>

<main class="stage">
  <header class="stage-head">
    <div class="crumb" id="crumb">/// DASHBOARD</div>
    <div class="stage-head-right">
      <button class="btn btn-ghost" id="refresh-btn" title="Poll all systems now">⟳ SYNC</button>
    </div>
  </header>
  <div class="view" id="view"></div>
</main>

<div class="toasts" id="toasts"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
